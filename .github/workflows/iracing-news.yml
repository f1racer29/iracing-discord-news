name: iRacing News to Discord

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  post-news:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: News prüfen und ggf. posten
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python check_iracing_news.py

      - name: Änderungen committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add last_posted.txt
          git diff --staged --quiet || git commit -m "Update last posted iRacing news"
          git push
